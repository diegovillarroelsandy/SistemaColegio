{% extends "admin/base.html" %}
{% block page_title %}Editar Usuario{% endblock %}
{% block admin_content %}
<div class="container-fluid">
  <div class="row">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="card-title mb-0"><i class="fas fa-user-edit me-2"></i>Editar Usuario</h5>
          <a href="{{ url_for('admin.ver_usuario', id=usuario.id) }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Volver</a>
        </div>
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Nombre completo</label>
              <input type="text" name="nombre_completo" class="form-control" value="{{ usuario.nombre_completo }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Correo</label>
              <input type="email" name="correo" class="form-control" value="{{ usuario.correo }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Nueva contraseña (opcional)</label>
              <input type="password" name="password" class="form-control" placeholder="Dejar en blanco para no cambiar">
            </div>
            <div class="d-flex justify-content-end gap-2">
              <a href="{{ url_for('admin.ver_usuario', id=usuario.id) }}" class="btn btn-outline-secondary">Cancelar</a>
              <button type="submit" class="btn btn-primary">Guardar cambios</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
